# Overseer variant w/ no TSFMC or TSF command radio key

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyStationMaster
  components:
  - type: EncryptionKey
    channels:
    - Common
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
    - Traffic
    defaultChannel: Service

- type: entity
  parent: EncryptionKeyStationMaster
  id: EncryptionKeyStationMasterSR
  components:
  - type: EncryptionKey
    channels:
    - Common
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
    - Traffic
    defaultChannel: Service

 # Diplomacy with faction heads, seperated from master key to allow toggling off
- type: entity
  parent: EncryptionKeyStationMaster
  id: EncryptionKeyDiplomacy
  name: diplomatic encryption key
  description: A direct communications channel to the heads of the sector's warring states.
  components:
  - type: EncryptionKey
    channels:
    - Command
    - VanguardCommand
    #- Nfsd #Deliberately excluded: You don't command them
    #- Freelance
    defaultChannel: Command

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyMaintenance
  name: Maintenance encryption key
  description: An encryption key for the maintenance communications channel.
  components:
  - type: EncryptionKey
    channels:
    - Common
    - Maintenance
    defaultChannel: Maintenance
  - type: Item
    sprite: Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_gray
    - state: eng_label
  - type: PirateBountyItem
    id: EncryptionKeyFaction

